<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Reverb Threads</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .admin-wrap {
            max-width: 1000px;
            margin: 40px auto;
            padding: 24px;
            background: #fff;
            border: 2px solid var(--color-text-dark);
            box-shadow: 10px 10px 0 var(--color-faded-teak);
        }
        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
        }
        .admin-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .admin-field input,
        .admin-field textarea,
        .admin-field select {
            border: 1px solid var(--color-text-dark);
            padding: 10px;
            font-family: inherit;
            font-size: 0.95rem;
        }
        .admin-field textarea {
            min-height: 90px;
            resize: vertical;
        }
        .admin-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }
        .admin-btn {
            cursor: pointer;
            border-radius: 0;
            padding: 10px 18px;
            border: 2px solid var(--color-text-dark);
            background: var(--color-burnt-brown);
            color: #fff;
            font-weight: 700;
        }
        .admin-btn.secondary {
            background: #fff;
            color: var(--color-text-dark);
        }
        .status-box {
            margin-top: 12px;
            font-weight: 700;
        }
        .product-card {
            border: 1px solid var(--color-text-dark);
            padding: 12px;
            margin-top: 10px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <header>
        <a href="../index.html" class="brand-text-logo">
            REVERB THREADS
            <img src="../assets/logoSymbol.png" alt="Reverb Threads Logo Symbol" class="logo-symbol">
        </a>
        <nav>
            <a href="../index.html">Home</a>
            <a href="../portfolio.html">The Stash</a>
            <a href="../about.html">Story</a>
            <a href="../contact.html">Signal</a>
        </nav>
    </header>

    <div class="container">
        <div id="login-view" class="admin-wrap">
            <h2>Admin Login</h2>
            <p>Open this page at <strong>/admin</strong> and sign in to edit texts and products.</p>
            <div class="admin-grid">
                <label class="admin-field">
                    Username
                    <input id="login-username" type="text" autocomplete="username">
                </label>
                <label class="admin-field">
                    Password
                    <input id="login-password" type="password" autocomplete="current-password">
                </label>
            </div>
            <div class="admin-actions">
                <button class="admin-btn" id="login-btn" type="button">Login</button>
            </div>
            <p class="status-box" id="login-status"></p>
        </div>

        <div id="editor-view" class="admin-wrap hidden">
            <h2>Content Editor</h2>
            <p>Edit texts and products, then save. Changes update all public pages.</p>

            <h3>Texts</h3>
            <div class="admin-grid" id="text-fields"></div>

            <h3 style="margin-top: 30px;">Products</h3>
            <div id="products-fields"></div>
            <div class="admin-actions">
                <button class="admin-btn secondary" id="add-product-btn" type="button">Add Product</button>
            </div>

            <div class="admin-actions">
                <button class="admin-btn" id="save-btn" type="button">Save Changes</button>
                <button class="admin-btn secondary" id="reset-btn" type="button">Reset to Defaults</button>
                <button class="admin-btn secondary" id="logout-btn" type="button">Logout</button>
            </div>
            <p class="status-box" id="editor-status"></p>
        </div>
    </div>

    <footer>
        &copy; 2025 Reverb Threads. Trnava, Slovakia.
    </footer>

    <script src="../content.js"></script>
    <script src="./admin.js"></script>
</body>
</html>
