<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverb Threads | Trnava</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="brand-text-logo">
            REVERB THREADS 
            <img src="assets/logoSymbol.png" alt="Reverb Threads Logo Symbol" class="logo-symbol">
        </a>
        <nav>
            <a href="index.html" id="nav-home" style="color: var(--color-burnt-brown);">Home</a>
            <a href="portfolio.html" id="nav-portfolio">The Stash</a>
            <a href="about.html" id="nav-about">Story</a>
            <a href="contact.html" id="nav-contact">Signal</a>
        </nav>
    </header>

    <div class="container">
        <h2 id="home-title" style="font-size: 2.5rem;">Od Retra po Psychadéliu <br>Upcycled in Slovakia.</h2>
        <p id="home-intro" style="font-size: 1.2rem; margin: 30px 0;">Jedinečné kúsky ktoré kombinujú farby a vzory pre originálny štýl.</p>
        <p id="home-tagline">Jedna ihla, jeden stroj, nekonečno možností.</p>
        <a href="portfolio.html" class="btn" id="home-cta">NAHLIADNI DO STASHU</a>
    </div>

    <footer>
        <span id="footer-copy">&copy; 2025 Reverb Threads. Trnava, Slovakia.</span>
    </footer>
    <script src="content.js"></script>
    <script>
        const texts = window.ReverbThreadsContent.getTexts();
        const setMultiline = (elementId, value) => {
            const element = document.getElementById(elementId);
            element.innerHTML = '';
            const lines = value.split('\n');
            lines.forEach((line, index) => {
                element.appendChild(document.createTextNode(line));
                if (index !== lines.length - 1) {
                    element.appendChild(document.createElement('br'));
                }
            });
        };
        document.getElementById('nav-home').textContent = texts.nav.home;
        document.getElementById('nav-portfolio').textContent = texts.nav.portfolio;
        document.getElementById('nav-about').textContent = texts.nav.about;
        document.getElementById('nav-contact').textContent = texts.nav.contact;
        setMultiline('home-title', texts.home.title);
        document.getElementById('home-intro').textContent = texts.home.intro;
        document.getElementById('home-tagline').textContent = texts.home.tagline;
        document.getElementById('home-cta').textContent = texts.home.cta;
        document.getElementById('footer-copy').textContent = texts.footer.copyright;
    </script>
</body>
</html>
